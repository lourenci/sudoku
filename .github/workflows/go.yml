name: Go

on:
  push:
    branches: [ main ]
  pull_request:

env:
  CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v2
      with:
        fetch-depth: 2
    - name: Set up Go
      uses: actions/setup-go@v2
      with:
        go-version: 1.17
    - name: Run coverage
      run: make coverage
    - name: Upload coverage to Codecov
      run: bash <(curl -s https://codecov.io/bash)
